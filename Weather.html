<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Weather App</title>
    <link rel="icon" href="https://uxwing.com/wp-content/themes/uxwing/download/weather/weather-icon.png">
    <link rel="stylesheet" href="output.css">
</head>
<body class="min-h-screen bg-linear-to-br from-blue-400 via-sky-200 to-cyan-300 flex items-center justify-center p-4">

    <div class="w-full max-w-md bg-white/30 backdrop-blur-lg shadow-2xl rounded-3xl p-6 border border-white/40">
        <h1 class="text-3xl font-medium text-white text-center drop-shadow-neutral-950 mb-6">🌤️Weather Application</h1>

        <div class="flex flex-col gap-4">
            <input type="text" id="city-name" placeholder="Enter City Name" 
            class="w-full px-4 py-3 rounded-xl outline-none border border-white/50
             bg-white/70 text-grey-800 placeholder-gray-500 focus:ring-2 focus:ring-blue-500">
            <button id="search-btn" class="bg-blue-300 hover:bg-blue-500 hover:text-white transition-all duration-300
            font-medium py-3 rounded-xl shadow-lg text-xl">Get Weather Details</button>
        </div>

        <div id="result" class="mt-6 bg-white/40 rounded-2xl p-5 text-center hidden text-red-600 font-semibold text-lg">

        </div>

    </div>

    
    <script src="Weather.js"></script>
</body>
</html>
